<!DOCTYPE html>
<html>
<head>
    <title>CuraMind AI - Login</title>
</head>
<body>
    <div style="max-width: 400px; margin: 50px auto; border: 1px solid #ccc; padding: 20px;">
        <h2>CuraMind AI Portal</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="width: 100%; padding: 10px; background: #2c3e50; color: white; border: none;">
                Login
            </button>
        </form>
    </div>
</body>
</html>
