server {
    listen 80;
    server_name localhost;

    # HIPAA Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_adders_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Adjust timeout for large DICOM uploads
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # If static files are not on S3 yet, Nginx handles them here
    location /static/ {
        alias /app/static/;
    }

    # We do NOT proxy /media/ through Nginx if we use S3.
    # If using local storage, this block allows serving media files.
    # location /media/ {
    #     alias /app/media/;
    # }
}
