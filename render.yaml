# render.yaml — Infrastructure as Code for Render.com
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: curamind-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    buildCommand: ""   # Docker build handles everything
    startCommand: ""   # CMD in Dockerfile (gunicorn) is used
    plan: free
    region: oregon     # Change to: frankfurt (Europe), singapore (Asia) if needed
    
    envVars:
      - key: SECRET_KEY
        generateValue: true           # Render auto-generates a secure random key
      
      - key: DEBUG
        value: "False"
      
      - key: DATABASE_URL
        fromDatabase:
          name: curamind-db
          property: connectionString  # Render auto-injects this from linked DB
      
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: curamind-ai
          property: host              # Auto-injects your app's hostname for ALLOWED_HOSTS
      
      - key: WEB_CONCURRENCY
        value: "1"                    # 1 gunicorn worker to stay within 512MB free RAM

    healthCheckPath: /admin/login/

databases:
  - name: curamind-db
    databaseName: curamind
    user: curamind_user
    plan: free
    region: oregon
